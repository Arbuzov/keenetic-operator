name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear description of the bug.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: keenetic-operator version / commit
    validations:
      required: true
  - type: input
    id: k8s
    attributes:
      label: Kubernetes version
  - type: input
    id: keeneticos
    attributes:
      label: KeeneticOS version / router model
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Controller logs / `kubectl describe keenetichostrecord`. Redact credentials.
      render: shell

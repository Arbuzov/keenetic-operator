name: Feature request
description: Suggest an idea or enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to achieve? What is missing today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How could the operator solve this? CRD field, new controller, config flag…
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
